<!-- ============================================================
     BilimQuest — ойын алдындағы НҰСҚАУЛЫҚ терезесі
     after_request арқылы барлық ойын беттеріне автоматты қосылады.
     Нұсқаулық жабылғанша таймерлер кідіртіледі (setInterval pause).
============================================================ -->
<style>
#bqGameIntro{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
  background:rgba(6,10,30,.94);backdrop-filter:blur(6px);padding:18px;
  font-family:'Nunito','Open Sans',system-ui,Arial,sans-serif;animation:bgiFade .3s ease both}
#bqGameIntro.hide{opacity:0;transition:opacity .25s ease}
@keyframes bgiFade{from{opacity:0}to{opacity:1}}
#bqGameIntro .bgi-card{width:min(460px,94vw);max-height:90vh;overflow-y:auto;
  background:linear-gradient(160deg,#161d44,#0b1030);border:1.5px solid rgba(70,120,230,.4);
  border-radius:26px;padding:26px 26px 22px;color:#e8eefc;text-align:center;
  box-shadow:0 26px 80px rgba(0,0,0,.6),0 0 60px rgba(40,90,220,.16);
  animation:bgiPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes bgiPop{from{transform:scale(.85) translateY(20px);opacity:0}to{transform:none;opacity:1}}
#bqGameIntro .bgi-ic{font-size:52px;line-height:1;margin-bottom:6px;animation:bgiBob 2.6s ease-in-out infinite}
@keyframes bgiBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
#bqGameIntro .bgi-chip{display:inline-block;font-size:11px;font-weight:800;color:#7dd3fc;
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
#bqGameIntro .bgi-title{font-family:'Exo 2','Nunito',sans-serif;font-size:27px;font-weight:900;
  color:#fff;margin-bottom:8px;line-height:1.15}
#bqGameIntro .bgi-sub{font-size:15px;color:#aebbe8;line-height:1.5;margin:0 auto 18px;max-width:380px}
#bqGameIntro .bgi-rules{text-align:left;background:rgba(255,255,255,.045);border:1px solid rgba(120,150,255,.18);
  border-radius:16px;padding:14px 16px;margin-bottom:18px;display:flex;flex-direction:column;gap:11px}
#bqGameIntro .bgi-rule{display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.45;color:#dbe6f7}
#bqGameIntro .bgi-rule .r-ic{flex-shrink:0;font-size:18px;line-height:1.3;width:24px;text-align:center}
#bqGameIntro .bgi-rule b{color:#9ec9ff;font-weight:800}
#bqGameIntro .bgi-goal{font-size:15px;color:#cfe9ff;margin-bottom:18px;font-weight:700}
#bqGameIntro .bgi-goal b{color:#7dffa0}
#bqGameIntro .bgi-start{display:block;width:100%;border:none;border-radius:50px;padding:15px;cursor:pointer;
  font-family:'Exo 2','Nunito',sans-serif;font-size:18px;font-weight:900;color:#06301a;
  background:linear-gradient(135deg,#7dffa0,#34d36b);box-shadow:0 10px 26px rgba(52,211,107,.45);
  transition:transform .15s ease,filter .2s ease}
#bqGameIntro .bgi-start:hover{transform:translateY(-2px);filter:brightness(1.05)}
</style>

<script>
/* Нұсқаулық ашық тұрғанда ойынды кідірту: setInterval-таймерлер жабылғанша кейінге қалдырылады */
(function(){
  if(window.__bqIntroInit) return; window.__bqIntroInit=1;
  var open=true, pending=[], rSI=window.setInterval, rCI=window.clearInterval, seq=1, map={};
  window.setInterval=function(fn,ms){
    var a=[].slice.call(arguments,2);
    if(open){ var id='bqp'+(seq++); pending.push({id:id,fn:fn,ms:ms,a:a}); return id; }
    return rSI.apply(window,[fn,ms].concat(a));
  };
  window.clearInterval=function(id){
    if(typeof id==='string' && id.lastIndexOf('bqp',0)===0){
      pending=pending.filter(function(p){return p.id!==id;});
      if(map[id]!=null){ rCI(map[id]); delete map[id]; }
      return;
    }
    return rCI(id);
  };
  window.__bqStart=function(){
    if(!open) return; open=false;
    pending.forEach(function(p){ map[p.id]=rSI.apply(window,[p.fn,p.ms].concat(p.a)); });
    pending=[];
  };
})();
</script>

<div id="bqGameIntro" role="dialog" aria-modal="true" aria-label="Ойын нұсқаулығы">
  <div class="bgi-card">
    <div class="bgi-ic">{{ icon }}</div>
    {% if chapter %}<div class="bgi-chip">{{ chapter }}</div>{% endif %}
    <div class="bgi-title">{{ game_title }}</div>
    {% if subtitle %}<div class="bgi-sub">{{ subtitle }}</div>{% endif %}
    <div class="bgi-rules">
      {% for r in rules %}
      <div class="bgi-rule"><span class="r-ic">{{ r.ic }}</span><span>{% if r.b %}<b>{{ r.b }}</b> — {% endif %}{{ r.t }}</span></div>
      {% endfor %}
    </div>
    <div class="bgi-goal">🎯 Мақсат: <b>{{ goal }}</b></div>
    <button class="bgi-start" id="bgiStart">▶ Бастау!</button>
  </div>
</div>

<script>
(function(){
  var b=document.getElementById('bgiStart');
  if(!b) return;
  b.addEventListener('click', function(){
    var v=document.getElementById('bqGameIntro');
    if(v){ v.classList.add('hide'); setTimeout(function(){ v.style.display='none'; },250); }
    if(window.__bqStart) window.__bqStart();   // ойын таймерлерін іске қосу
  });
})();
</script>
