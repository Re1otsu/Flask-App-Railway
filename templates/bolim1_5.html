<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BilimQuest — Екілік ақпарат практикум</title>
  <link rel="stylesheet" href="/static/css/normalize.css">
  <link rel="stylesheet" href="/static/css/bolim1_1.css">
</head>
<body>

  <div class="top-bar">
    <h1>BilimQuest</h1>
    <h2>Екілік ақпарат · Практикум</h2>
    <a href="/1module">Артқа</a>
  </div>

  <div class="shooting-star"></div>
  <main class="page-content">
    <div class="chapter-header">
      <div class="chapter-title">Ойындарды таңда</div>
      <div class="chapter-sub">1-тоқсан · 5-бөлім</div>
    </div>

    <div class="games-grid">
      <a href="/game10" class="game-card {% if not completed['Робот'] %}disabled{% endif %}">
        <img src="/static/img/puzzle.png" alt="Пазл">
        <span>Пазл</span>
      </a>
    </div>
  </main>

  <div id="module-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <iframe id="module-frame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script src="/static/js/moduls.js"></script>
</body>
</html>
