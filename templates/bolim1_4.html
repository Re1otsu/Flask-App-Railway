<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BilimQuest — Екілік ақпарат</title>
  <link rel="stylesheet" href="/static/css/normalize.css">
  <link rel="stylesheet" href="/static/css/bolim1_1.css">
</head>
<body>

  <div class="top-bar">
    <h1>BilimQuest</h1>
    <h2>Екілік ақпаратты көрсету</h2>
    <a href="/1module">Артқа</a>
  </div>

  <div class="shooting-star"></div>
  <main class="page-content">
    <div class="chapter-header">
      <div class="chapter-title">Ойындарды таңда</div>
      <div class="chapter-sub">1-тоқсан · 4-бөлім</div>
    </div>

    <div class="games-grid">
      <a href="/game8" class="game-card">
        <img src="/static/img/bot.png" alt="Робот">
        <span>Робот</span>
      </a>
      <a href="/game9" class="game-card">
        <img src="/static/img/balls.png" alt="Сиқырлы шарлар">
        <span>Сиқырлы шарлар</span>
      </a>
      <a href="/module4" class="game-card">
        <img src="/static/img/block.png" alt="Блоктар">
        <span>Блоктар</span>
      </a>
    </div>
  </main>

  <div id="module-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <iframe id="module-frame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script src="/static/js/moduls.js"></script>
</body>
</html>
