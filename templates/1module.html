<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/1module.css') }}">
<title>BilimQuest Карты</title>
<style>.qnav-home{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap;line-height:1;transition:background .2s}.qnav-home:hover{background:rgba(255,255,255,.26)}</style>
</head>
<body>

  <!-- Верхняя панель -->
  <div class="topbar">
    <div class="title">BilimQuest</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="coins">⭐ {{ "%.2f"|format(student.score) }}</div>
    </div>
  </div>

  <!-- Полотно карты -->
  <div class="map" id="map">
    <div class="galaxy-title">
      <img src="static/img/AG.png" alt="Ақпарат галактикасы">
    </div>

    <svg class="paths" viewBox="0 0 1000 600" preserveAspectRatio="none">

      <path d="M110,410 C150,100 320,50 450,60" />

      <path d="M650,200 600,150 560,120" />

      <path d="M410,450 C450,550 490,260 600,420" />
   
      <path d="M350,370 C450,200 180,240 140,420" />

      <path d="M660,470 C750,420 1050,700 875,440" />
      
      <path d="M870,430 855,400 825,350" />
      <path d="M820,340 C720,200 750,80 880,120" />
      <path d="M890,125 C1100,280 780,350 660,210" />
    </svg>

    <!-- Островки/модули (позиции в %) -->
    <a class="node" id="i1" href="/bolim1_1">
      <div class="island"><img src="static/img/first_1.png" class="emoji" style="width:auto; height:30vh; transform: translate(0, -10vh);"></div>
      <div class="label" style="font-size:2.5vh;">Айналамыздағы ақпарат</div>
    </a>

    <a class="node" id="i2" href="/bolim1_2">
      <div class="island"><img src="static/img/second_1.png" class="emoji" style="width:auto; height:30vh; transform: translate(0, -13vh);"></div>
      <div class="label" style="font-size:2.5vh;">Ақпаратты беру</div>
    </a>

    <a class="node" id="i3" href="/bolim1_3">
      <div class="island"><img src="static/img/3.1.png" class="emoji" style="width:auto; height:30vh; transform: translate(0, -12vh);"></div>
      <div class="label" style="font-size:2.5vh;">Ақпаратты шифрлау</div>
    </a>

    <a class="node" id="i4" href="/bolim1_4">
      <div class="island"><img src="static/img/4.1.png" class="emoji" style="width:auto; height:35vh; transform: translate(0, -16vh);"></div>
      <div class="label" style="font-size:2.5vh;">Екілік ақпаратты көрсету</div>
    </a>


    <a class="node" id="earth" href="/student">
      <img src="static/img/home.png" style="height:auto; width:18vw; border-radius:8em;">
            <div class="label" style="font-size:2.5vh;">Басты бет</div>
    </a>
    <a class="node" id="saturn" >
      <img src="static/img/saturn.png" style="height:auto; width:10vw;">
    </a>

  </div>

<script>
  // Пример: запрет клика по заблокированному модулю
  document.querySelectorAll('.node.locked').forEach(n=>{
    n.addEventListener('click', e=>{
      e.preventDefault();
      n.animate([{transform:'translate(-50%,-50%)'}, {transform:'translate(-50%,-50%) rotate(-2deg)'},
                 {transform:'translate(-50%,-50%) rotate(2deg)'},
                 {transform:'translate(-50%,-50%)'}], {duration:300});
    });
  });
</script>
</body>
</html>
