<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Quest</title>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/toqsan_4.css') }}">
</head>
<body>

  <header class="p-topbar">
    <div class="p-brand">
      <div class="p-logo">BilimQuest</div>
    </div>
    <div class="p-actions">
      <div class="p-score">⭐ {{ "%.2f"|format(student.score) }}</div>
    </div>
  </header>

  <main class="p-stage">

    <div class="quest-title">

    </div>

    <svg class="p-paths" viewBox="0 0 1000 600" preserveAspectRatio="none" aria-hidden="true">
      <path id="path-01" d="M220,100 C200,100 300,180 450,120" />
      <path id="path-12" d="M450,130 C600,150 700,80 750,100" />
      <path id="path-23" d="M720,120 C550,150 400,300 420,310" />
      <path id="path-34" d="M400,320 C330,380 300,400 200,470" />
    </svg>

    <div class="q-fireflies" data-path="#path-01" data-count="6" data-speed="0.15"></div>
    <div class="q-fireflies" data-path="#path-12" data-count="6" data-speed="0.15"></div>
    <div class="q-fireflies" data-path="#path-23" data-count="6" data-speed="0.15"></div>
    <div class="q-fireflies" data-path="#path-34" data-count="6" data-speed="0.15"></div>

    <a class="p-hero" href="/student" aria-label="Артқа">
      <img src="{{ url_for('static', filename='img/gollogram_boy.png') }}" alt="Hero">
      <div class="p-hero-title">Басты бет</div>
    </a>

    <!-- n1: matching -->
    <a class="p-node" id="n1" href="/module1" aria-label="Сәйкестік">
      <div class="p-platform">
        <img class="p-platform-img" src="{{ url_for('static', filename='img/quest_1.png') }}" alt="">
      </div>
      <div class="p-label">
        <div class="p-label-title">Сәйкестік ойыны</div>
      </div>
    </a>

    <!-- n2: maze -->
    <a class="p-node" id="n2" href="/module2" aria-label="Лабиринт">
      <div class="p-platform">
        <img class="p-platform-img" src="{{ url_for('static', filename='img/quest_2.1.png') }}" alt="">
      </div>
      <div class="p-label">
        <div class="p-label-title">Лабиринт</div>
      </div>
    </a>

    <!-- n3: cipher_game -->
    <a class="p-node" id="n3" href="/module3" aria-label="Шифр ойыны">
      <div class="p-platform">
        <img class="p-platform-img" src="{{ url_for('static', filename='img/quest_3.1.png') }}" alt="">
      </div>
      <div class="p-label">
        <div class="p-label-title">Шифр ойыны</div>
      </div>
    </a>

    <!-- n4: push_blocks_all -->
    <a class="p-node p-finish" id="n4" href="/module4" aria-label="Блок тасымалдау">
      <div class="p-platform">
        <img class="p-platform-img" src="{{ url_for('static', filename='img/quest_final_1.png') }}" alt="">
      </div>
      <div class="p-label">
        <div class="p-label-title">Блок тасымалдау</div>
      </div>
    </a>

  </main>

  <script>
(() => {
  function initFireflies(layer) {
    const pathSel = layer.dataset.path;
    const count   = parseInt(layer.dataset.count || "8", 10);
    const speed   = parseFloat(layer.dataset.speed || "0.15");

    const path = document.querySelector(pathSel);
    if (!path) return;

    const svg   = path.ownerSVGElement;
    const total = path.getTotalLength();

    const flies = [];
    for (let i = 0; i < count; i++) {
      const el = document.createElement("div");
      el.className = "q-firefly";
      layer.appendChild(el);
      flies.push({
        el,
        t: (i / count) + Math.random() * 0.08,
        w: 0.6 + Math.random() * 0.8
      });
    }

    function svgPointToLayerXY(pt) {
      const svgRect   = svg.getBoundingClientRect();
      const layerRect = layer.getBoundingClientRect();
      return {
        x: (pt.x / 1000) * svgRect.width  + (svgRect.left - layerRect.left),
        y: (pt.y / 600)  * svgRect.height + (svgRect.top  - layerRect.top)
      };
    }

    let last = performance.now();
    function tick(now) {
      const dt = (now - last) / 1000;
      last = now;
      for (const f of flies) {
        f.t += dt * speed * f.w;
        if (f.t > 1) f.t -= 1;
        const p        = path.getPointAtLength(total * f.t);
        const { x, y } = svgPointToLayerXY(p);
        f.el.style.left = x + "px";
        f.el.style.top  = y + "px";
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  document.querySelectorAll(".q-fireflies").forEach(initFireflies);
})();
  </script>

</body>
</html>
