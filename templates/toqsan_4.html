<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BilimQuest — Квест жолы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cyan:#37e1ff;
    --magenta:#ff4fd8;
    --green:#46e06a;
    --gold:#ffcf48;
    --ink:#06121a;
    --panel:#0e1f29;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:#05080a;
    font-family:'Rubik',system-ui,'Segoe UI',Roboto,sans-serif;
    overflow:hidden;
    color:#eaf6ff;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- scaling stage ---------- */
  #viewport{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%, #0a1218 0%, #05080a 80%);
  }
  #stage{
    position:relative;
    width:1920px;height:1080px;
    transform-origin:center center;
    flex:0 0 auto;
    overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.7);
  }
  #bg{
    position:absolute;inset:0;
    background:url("{{ url_for('static', filename='img/toqsan4/background.png') }}") center/cover no-repeat;
  }
  /* atmospheric depth */
  #bg::after{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(120% 80% at 50% 45%, rgba(70,170,120,.10), transparent 60%),
      radial-gradient(140% 120% at 50% 110%, rgba(0,0,0,.55), transparent 55%),
      linear-gradient(to bottom, rgba(4,12,16,.45), rgba(4,12,16,0) 22%, rgba(4,12,16,0) 70%, rgba(4,12,16,.5));
  }

  /* ---------- neon path ---------- */
  #paths{position:absolute;inset:0;width:1920px;height:1080px;pointer-events:none;}
  .seg-base{fill:none;stroke:rgba(120,140,160,.28);stroke-width:9;stroke-linecap:round;}
  .seg-glow{fill:none;stroke:var(--cyan);stroke-width:7;stroke-linecap:round;
    filter:drop-shadow(0 0 10px var(--cyan));opacity:.18;transition:opacity .5s;}
  .seg-dash{fill:none;stroke:var(--magenta);stroke-width:3.5;stroke-linecap:round;
    stroke-dasharray:2 22;opacity:0;transition:opacity .5s;
    filter:drop-shadow(0 0 6px var(--magenta));}
  .seg.lit .seg-glow{opacity:.95;}
  .seg.lit .seg-dash{opacity:1;animation:flow 1.1s linear infinite;}
  @keyframes flow{to{stroke-dashoffset:-24;}}

  /* ---------- check gates ---------- */
  .gate{position:absolute;width:48px;height:48px;transform:translate(-50%,-50%) scale(.4);
    opacity:0;transition:opacity .4s, transform .4s;pointer-events:none;z-index:6;}
  .gate.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .gate .disc{width:100%;height:100%;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #7dffa0, #2bbd54 60%, #1a8a3c);
    box-shadow:0 0 16px rgba(70,224,106,.8), inset 0 -3px 6px rgba(0,0,0,.35), inset 0 3px 4px rgba(255,255,255,.4);
    display:flex;align-items:center;justify-content:center;border:2px solid rgba(220,255,230,.6);}
  .gate svg{width:26px;height:26px;}

  /* ---------- hero (static) ---------- */
  #hero{position:absolute;left:55px;top:150px;width:200px;height:auto;z-index:7;
    filter:drop-shadow(0 18px 22px rgba(0,0,0,.55));}

  /* ---------- nodes ---------- */
  .node{position:absolute;transform:translate(-50%,-50%);z-index:8;
    background:none;border:none;cursor:pointer;padding:0;
    width:240px;display:flex;flex-direction:column;align-items:center;
    -webkit-tap-highlight-color:transparent;}
  .node .art{position:relative;width:400px;height:300px;display:flex;align-items:center;justify-content:center;
    animation:float var(--dur,5s) ease-in-out infinite;animation-delay:var(--delay,0s);}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .node .art img{width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 12px 16px rgba(0,0,0,.5));transition:filter .25s, transform .25s;}
  .halo{position:absolute;left:50%;top:54%;width:230px;height:150px;transform:translate(-50%,-50%);
    border-radius:50%;z-index:-1;filter:blur(14px);opacity:.0;transition:opacity .35s;}
  .node.completed .halo{opacity:.55;background:radial-gradient(ellipse, rgba(70,224,106,.85), transparent 68%);}
  .node.active .halo{opacity:.85;background:radial-gradient(ellipse, rgba(255,207,72,.9), transparent 66%);
    animation:pulseHalo 1.8s ease-in-out infinite;}
  .node.locked .halo{opacity:.0;}
  @keyframes pulseHalo{0%,100%{opacity:.5;}50%{opacity:.95;}}

  /* status ring */
  .ring{position:absolute;left:50%;top:54%;width:188px;height:188px;transform:translate(-50%,-50%);
    border-radius:50%;pointer-events:none;}
  .node.active .ring{border:5px dashed rgba(255,207,72,.95);animation:spin 9s linear infinite;
    box-shadow:0 0 26px rgba(255,207,72,.65), inset 0 0 22px rgba(255,207,72,.3);}
  .node.active .art{filter:drop-shadow(0 0 18px rgba(255,207,72,.55));}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

  /* locked dim */
  .node.locked .art img{filter:grayscale(.85) brightness(.5) drop-shadow(0 10px 14px rgba(0,0,0,.5));}
  .node.locked{cursor:not-allowed;}

  /* corner badge */
  .corner{position:absolute;top:8px;right:30px;width:54px;height:54px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:3;transition:transform .25s;
    transform:scale(0);}
  .node.completed .corner.check,.node.locked .corner.lock{transform:scale(1);}
  .corner.check{background:radial-gradient(circle at 38% 32%, #7dffa0, #2bbd54 60%, #1a8a3c);
    box-shadow:0 0 14px rgba(70,224,106,.8), inset 0 -3px 5px rgba(0,0,0,.3), inset 0 3px 3px rgba(255,255,255,.4);
    border:2px solid rgba(220,255,230,.6);}
  .corner.lock{background:radial-gradient(circle at 38% 32%, #6f7d8c, #3a4654 60%, #232c36);
    box-shadow:0 0 12px rgba(0,0,0,.45), inset 0 -3px 5px rgba(0,0,0,.4), inset 0 3px 3px rgba(255,255,255,.18);
    border:2px solid rgba(180,200,220,.35);}
  .corner svg{width:28px;height:28px;}

  /* hover */
  .node:not(.locked):hover .art img{transform:scale(1.06);
    filter:drop-shadow(0 16px 20px rgba(0,0,0,.55)) brightness(1.08);}
  .node:not(.locked):active .art img{transform:scale(.99);}

  /* label */
  .label{margin-top:-6px;position:relative;z-index:4;max-width:230px;
    padding:9px 16px;border-radius:13px;text-align:center;
    background:linear-gradient(180deg, rgba(28,44,40,.92), rgba(14,26,24,.95));
    border:1.5px solid rgba(120,200,170,.4);
    box-shadow:0 6px 14px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
    font-weight:700;font-size:18px;line-height:1.18;letter-spacing:.2px;
    color:#eafff4;text-wrap:balance;transition:border-color .25s, box-shadow .25s;}
  .node.active .label{border-color:rgba(255,207,72,.75);box-shadow:0 6px 16px rgba(0,0,0,.5),0 0 16px rgba(255,207,72,.3);}
  .node.locked .label{color:#9fb0b8;border-color:rgba(120,140,150,.3);}
  .node.completed .label{border-color:rgba(70,224,106,.6);}
  .label .num{display:inline-block;font-size:13px;font-weight:800;color:var(--gold);
    letter-spacing:1px;opacity:.9;margin-bottom:2px;}

  /* ---------- top HUD ---------- */
  .hud{position:absolute;left:0;right:0;top:0;height:96px;z-index:20;
    display:flex;align-items:flex-start;justify-content:space-between;padding:22px 30px;}
  .hud-left{display:flex;align-items:center;gap:34px;padding-top:6px;}
  .brand{font-weight:900;font-size:30px;letter-spacing:.5px;
    color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.5),0 0 18px rgba(55,225,255,.45);}
  .nav-link{display:flex;align-items:center;gap:8px;font-weight:600;font-size:19px;color:#cfe7ef;
    text-decoration:none;cursor:pointer;opacity:.9;transition:opacity .2s,color .2s;}
  .nav-link:hover{opacity:1;color:#fff;}
  .nav-link .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}

  .player{display:flex;align-items:center;gap:13px;
    background:linear-gradient(180deg, rgba(18,30,42,.82), rgba(10,18,26,.9));
    border:1.5px solid rgba(80,140,180,.4);border-radius:16px;padding:9px 16px 9px 10px;
    box-shadow:0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);}
  .ava{width:50px;height:50px;border-radius:13px;overflow:hidden;flex:0 0 auto;
    border:2px solid rgba(120,210,255,.55);box-shadow:0 0 12px rgba(55,225,255,.4);
    background:#13314a;}
  .ava img{width:135%;height:135%;object-fit:cover;transform:translate(-13%,-6%);}
  .pmeta{display:flex;flex-direction:column;line-height:1.25;}
  .score{font-weight:800;font-size:19px;color:var(--gold);text-shadow:0 0 10px rgba(255,207,72,.4);}
  .score b{font-size:21px;}
  .chapter{font-size:13px;color:#a9c4d2;font-weight:500;max-width:230px;}

  /* ---------- title banner ---------- */
  .banner{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:15;
    padding:16px 54px;border-radius:18px;text-align:center;
    background:linear-gradient(180deg,#2f4a3f,#1b2c26);
    border:2px solid rgba(120,200,170,.5);
    box-shadow:0 10px 30px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.12), inset 0 -4px 10px rgba(0,0,0,.4),
      0 0 0 5px rgba(8,16,14,.55), 0 0 34px rgba(55,225,255,.18);}
  .banner::before,.banner::after{content:"";position:absolute;top:50%;width:18px;height:64px;
    transform:translateY(-50%);border-radius:5px;background:linear-gradient(180deg,#7fe9ff,#1d7fb0);
    box-shadow:0 0 14px rgba(55,225,255,.7), inset 0 0 6px rgba(255,255,255,.5);}
  .banner::before{left:-10px;}
  .banner::after{right:-10px;}
  .banner h1{font-weight:900;font-size:36px;line-height:1.05;letter-spacing:.5px;text-transform:uppercase;
    background:linear-gradient(180deg,#fff3c9 0%,#ffcf48 55%,#e89a14 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-stroke:1px rgba(60,30,0,.35);
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.45));}

  /* ---------- side & corner chrome ---------- */
  .side-tab{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:20;
    width:46px;height:84px;border-radius:0 16px 16px 0;cursor:pointer;
    background:linear-gradient(180deg, rgba(18,30,42,.9), rgba(10,18,26,.92));
    border:1.5px solid rgba(80,140,180,.4);border-left:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:6px 0 18px rgba(0,0,0,.4);transition:width .2s;text-decoration:none;}
  .side-tab:hover{width:54px;}
  .side-tab svg{width:22px;height:22px;}
  .home-btn{position:absolute;left:18px;bottom:24px;z-index:20;width:62px;height:62px;border-radius:16px;cursor:pointer;
    background:linear-gradient(180deg, rgba(18,30,42,.9), rgba(10,18,26,.92));
    border:1.5px solid rgba(80,140,180,.4);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.45);transition:transform .2s,border-color .2s;text-decoration:none;}
  .home-btn:hover{transform:translateY(-2px);border-color:rgba(120,210,255,.7);}
  .home-btn svg{width:26px;height:26px;}
  .compass{position:absolute;right:26px;bottom:24px;z-index:20;width:66px;height:66px;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle at 38% 32%, #1a3245, #0c1722);
    border:2px solid rgba(120,210,255,.5);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.5), 0 0 18px rgba(55,225,255,.25), inset 0 2px 5px rgba(255,255,255,.1);
    transition:transform .25s;}
  .compass:hover{transform:rotate(45deg);}
  .compass svg{width:34px;height:34px;}

  /* hint */
  .hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:14;
    font-size:16px;font-weight:500;color:#bcd6e0;letter-spacing:.3px;
    text-shadow:0 2px 6px rgba(0,0,0,.8);text-align:center;}

  /* ---------- modal ---------- */
  #overlay{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(4,10,14,.62);backdrop-filter:blur(3px);}
  #overlay.show{display:flex;}
  .modal{width:560px;max-width:88%;border-radius:22px;overflow:hidden;position:relative;
    background:linear-gradient(180deg,#16303a,#0c1c24);
    border:2px solid rgba(120,200,180,.45);
    box-shadow:0 30px 80px rgba(0,0,0,.7), inset 0 2px 0 rgba(255,255,255,.1), 0 0 40px rgba(55,225,255,.2);
    transform:translateY(18px) scale(.96);opacity:0;transition:transform .3s, opacity .3s;}
  #overlay.show .modal{transform:translateY(0) scale(1);opacity:1;}
  .modal-head{position:relative;height:172px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%, rgba(55,225,255,.18), transparent 65%);
    border-bottom:1px solid rgba(120,200,180,.25);}
  .modal-head img{height:160px;filter:drop-shadow(0 12px 18px rgba(0,0,0,.5));}
  .modal-body{padding:24px 30px 28px;}
  .m-step{font-size:13px;font-weight:800;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;}
  .m-title{font-size:26px;font-weight:900;margin:5px 0 12px;line-height:1.1;color:#fff;}
  .m-desc{font-size:16px;line-height:1.55;color:#c4dbe6;}
  .m-meta{display:flex;gap:10px;margin:18px 0 4px;flex-wrap:wrap;}
  .chip{font-size:13px;font-weight:600;padding:6px 13px;border-radius:999px;
    background:rgba(55,225,255,.1);border:1px solid rgba(55,225,255,.3);color:#bfeeff;}
  .chip.done{background:rgba(70,224,106,.12);border-color:rgba(70,224,106,.4);color:#bcf5cd;}
  .m-actions{display:flex;gap:12px;margin-top:22px;}
  .btn{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:18px;
    padding:15px;border-radius:14px;transition:transform .15s, box-shadow .2s, filter .2s;letter-spacing:.3px;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{color:#08231a;background:linear-gradient(180deg,#7dffa0,#33c75e);
    box-shadow:0 8px 18px rgba(51,199,94,.4), inset 0 2px 0 rgba(255,255,255,.5);}
  .btn-primary:hover{filter:brightness(1.06);box-shadow:0 10px 24px rgba(51,199,94,.55), inset 0 2px 0 rgba(255,255,255,.5);}
  .btn-ghost{flex:0 0 auto;padding:15px 22px;color:#cfe7ef;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);}
  .btn-ghost:hover{background:rgba(255,255,255,.12);}
  .m-close{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:12px;cursor:pointer;z-index:3;
    background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.18);color:#dff;font-size:22px;
    display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .m-close:hover{background:rgba(0,0,0,.5);}

  /* toast */
  #toast{position:absolute;left:50%;bottom:120px;transform:translateX(-50%) translateY(20px);z-index:60;
    background:rgba(20,30,38,.95);border:1.5px solid rgba(255,120,120,.5);color:#ffd9d9;
    padding:13px 22px;border-radius:13px;font-weight:600;font-size:16px;opacity:0;pointer-events:none;
    transition:opacity .3s, transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .node.shake{animation:shake .45s;}
  @keyframes shake{0%,100%{transform:translate(-50%,-50%);}20%{transform:translate(-53%,-50%);}40%{transform:translate(-47%,-50%);}60%{transform:translate(-52%,-50%);}80%{transform:translate(-48%,-50%);}}
</style>
<style>.qnav-home{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap;line-height:1;transition:background .2s}.qnav-home:hover{background:rgba(255,255,255,.26)}
.hud-actions{display:flex;align-items:center;gap:12px}
.chip-score{height:54px;padding:0 22px;border-radius:999px;display:flex;align-items:center;gap:10px;background:linear-gradient(45deg,#ffd34d,#ffb300);color:#1f2d3d;font-weight:900;font-size:25px;box-shadow:0 10px 22px rgba(0,0,0,.25)}
.chip-score b{font-size:26px}
.chip-ico{width:28px;height:28px;flex-shrink:0}
.hero-link{cursor:pointer;display:block}
.hero-link #hero{transition:transform .2s,filter .2s}
.hero-link:hover #hero{transform:scale(1.05);filter:drop-shadow(0 22px 26px rgba(0,0,0,.6)) brightness(1.08)}
.t4-badges{display:flex;gap:7px;justify-content:center;margin-top:6px}
.t4-pip{font-size:32px;line-height:1;filter:grayscale(1);opacity:.3}
.t4-pip.on{opacity:1;filter:drop-shadow(0 0 9px rgba(255,200,80,.85))}</style>
</head>
<body>
<div id="viewport">
  <div id="stage" data-screen-label="Квест картасы">
    <div id="bg"></div>

    <!-- neon paths (connect nodes: 1 top-left → 2 bottom-left → 3 bottom-center → 4 top-right → 5 bottom-right) -->
    <svg id="paths" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <g class="seg" data-seg="0">
        <path class="seg-base" d="M707,300 C600,480 430,560 345,720"/>
        <path class="seg-glow" d="M707,300 C600,480 430,560 345,720"/>
        <path class="seg-dash" d="M707,300 C600,480 430,560 345,720"/>
      </g>
      <g class="seg" data-seg="1">
        <path class="seg-base" d="M345,720 C540,820 760,805 975,735"/>
        <path class="seg-glow" d="M345,720 C540,820 760,805 975,735"/>
        <path class="seg-dash" d="M345,720 C540,820 760,805 975,735"/>
      </g>
      <g class="seg" data-seg="2">
        <path class="seg-base" d="M975,735 C1180,640 1340,470 1500,320"/>
        <path class="seg-glow" d="M975,735 C1180,640 1340,470 1500,320"/>
        <path class="seg-dash" d="M975,735 C1180,640 1340,470 1500,320"/>
      </g>
      <g class="seg" data-seg="3">
        <path class="seg-base" d="M1500,320 C1665,440 1675,600 1570,745"/>
        <path class="seg-glow" d="M1500,320 C1665,440 1675,600 1570,745"/>
        <path class="seg-dash" d="M1500,320 C1665,440 1675,600 1570,745"/>
      </g>
    </svg>

    <!-- hero → главная -->
    <a href="/student" class="hero-link" title="Басты бетке оралу" aria-label="Басты бет">
      <img id="hero" src="{{ url_for('static', filename='img/toqsan4/hero.png') }}" alt="Кейіпкер">
      
    </a>

    <!-- nodes injected by JS -->
    <div id="nodes"></div>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-left">
        <div class="brand">BilimQuest</div>
      </div>
      <div class="hud-actions">
        <div class="chip-score" title="Кибер-ұпай">
          <svg class="chip-ico" viewBox="0 0 24 24" fill="none" stroke="#1f2d3d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>
          <b id="scoreVal">{{ "%.2f"|format(student.score) }}</b>
        </div>
      </div>
    </div>

    <!-- title banner -->
    <div class="banner"><h1>Компьютер және қауіпсіздік</h1></div>

    <!-- chrome -->
    <a class="side-tab" title="Мәзір" href="/student">
      <svg viewBox="0 0 24 24" fill="none" stroke="#9fdfff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </a>
    <a class="home-btn" title="Шығу" href="/student">
      <svg viewBox="0 0 24 24" fill="none" stroke="#9fdfff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </a>
    <div class="compass" title="Карта">
      <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="none" stroke="#7fe0ff" stroke-width="1.6"/><polygon points="16,5 19,16 16,27 13,16" fill="#ff6a8a"/><polygon points="5,16 16,13 27,16 16,19" fill="#7fe0ff"/><circle cx="16" cy="16" r="2.2" fill="#fff"/></svg>
    </div>

    <div class="hint">Уақыт порталын ашу үшін блоктарды дұрыс ретпен аяқтаңыз</div>

    <!-- modal -->
    <div id="overlay">
      <div class="modal">
        <button class="m-close" id="mClose">&times;</button>
        <div class="modal-head"><img id="mImg" alt=""></div>
        <div class="modal-body">
          <div class="m-step" id="mStep"></div>
          <div class="m-title" id="mTitle"></div>
          <div class="m-desc" id="mDesc"></div>
          <div class="m-meta" id="mMeta"></div>
          <div class="m-actions" id="mActions"></div>
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script>
/* ====== asset base + real student score ====== */
const A = "{{ url_for('static', filename='img/toqsan4/') }}";
const BASE_SCORE = {{ "%.2f"|format(student.score) }};

/* ====== check-mark svg reused (node corner badges only) ====== */
const CHK = '<svg viewBox="0 0 24 24" fill="none" stroke="#0a3a18" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>';

/* ====== значки по играм (с сервера) ====== */
const STARS = {{ stars|default({})|tojson }};
const ROUTE_GAME = {'/toqsan4/g1':'Эргономика','/toqsan4/g2':'Цифрлық детектив','/toqsan4/g3':'Желілік жүгіруші','/toqsan4/g4':'Кибер-бекініс','/toqsan4/g5':'Файл әлемі'};

/* ====== quest data ====== */
const NODES = [
  { id:'ergo',     img:A+'Слой 1.png',     x:700,  y:400, dur:5.2, delay:0, route:'/toqsan4/g1',
    short:'Компьютерде жұмыс<br>істеу қауіпсіздігі',
    title:'Компьютерде жұмыс істеу қауіпсіздігі',
    desc:'Кибер-эргономика: ЖИ-Көмекшіні «емде»! Дұрыс отыру, үзіліс және экран қашықтығы туралы біл, оның денсаулығын 100%-ға жеткіз.',
    tags:['🎮 Ойын','≈3 мин','+0.10 ⭐'] },
  { id:'storage',  img:A+'node-storage.png',  x:270,  y:780, dur:4.6, delay:.6, route:'/toqsan4/g2',
    short:'Ақпараттың цифрлық<br>тасымалдаушылары',
    title:'Ақпараттың цифрлық тасымалдаушылары',
    desc:'Цифрлық детектив: жоғалған файлдарды қауіпсіз жеткіз! Тасымалдаушыларды танып, дұрыс таңдау жаса, деректер кристалдарын жина (💎 5).',
    tags:['🎮 Ойын','3 сахна','+0.20 ⭐'] },
  { id:'internet', img:A+'node-internet.png', x:980,  y:710, dur:5.6, delay:.3, route:'/toqsan4/g3',
    short:'Интернеттегі қауіпсіздік<br>және этика',
    title:'Интернеттегі қауіпсіздік және этика',
    desc:'Кибер-Тұзақ: Желілік жүгіруші! Фишинг, күмәнді сілтемелер мен алаяқтардан секіріп өт, қауіпсіз сайттарды жина. 🏃‍♂️',
    tags:['🎮 Раннер','+0.30 ⭐'] },
  { id:'protect',  img:A+'node-protect.png',  x:1540, y:350, dur:5.0, delay:.9, route:'/toqsan4/g4',
    short:'Ақпаратты қорғау<br>және парольдер',
    title:'Ақпаратты қорғау және парольдер',
    desc:'Кибер-Бекініс (Tower Defense): базаны Пароль, Антивирус, Брандмауэр мұнараларымен қорша да фишинг, троян мен Ransomware толқындарын тойтар! 💎',
    tags:['🎮 Стратегия','3 толқын','+0.30 ⭐'] },
  { id:'cloud',    img:A+'node-cloud.png',    x:1680, y:790, dur:4.8, delay:.45, route:'/toqsan4/g5',
    short:'Бұлтты сақтау<br>және ынтымақтастық',
    title:'Бұлтты сақтау және ынтымақтастық',
    desc:'Кибер-Аквариум: Файл Әлемі! Match-3 ойынынан кейін файлдарды папкаларға сұрыпта, бірлесе өңде және дұрыс құқықпен бөліс. 💎',
    tags:['🎮 Match-3 + Workspace','+0.30 ⭐'] },
];

const KEY='bilimquest_t4_progress_v1';
let state = load();

function load(){
  let s=null;
  try{ s=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!s || !s.status || s.status.length!==NODES.length){
    s = { status: NODES.map(()=>'active') };
  }
  // all blocks are OPEN: keep finished ones marked 'done', everything else is 'active' (never locked)
  s.status = s.status.map(st => st==='done' ? 'done' : 'active');
  return s;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ====== render nodes ====== */
const nodesEl=document.getElementById('nodes');
NODES.forEach((n,i)=>{
  const b=document.createElement('button');
  b.className='node';
  b.dataset.i=i;
  b.style.left=n.x+'px';
  b.style.top=n.y+'px';
  b.style.setProperty('--dur', n.dur+'s');
  b.style.setProperty('--delay', n.delay+'s');
  b.innerHTML=`
    <div class="halo"></div>
    <div class="art">
      <div class="ring"></div>
      <div class="corner check">${CHK}</div>
      <div class="corner lock"><svg viewBox="0 0 24 24" fill="none" stroke="#cfe0ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
      <img src="${n.img}" alt="${n.title}">
    </div>
    <div class="label"><span class="num">БЛОК ${i+1}</span><br>${n.short}</div>
    <div class="t4-badges">${(function(){var sc=STARS[ROUTE_GAME[n.route]]||0,p='';for(var j=0;j<3;j++){p+='<span class="t4-pip'+(j<sc?' on':'')+'">🔩</span>';}return p;})()}</div>`;
  b.addEventListener('click',()=>openNode(i));
  nodesEl.appendChild(b);
});
const nodeEls=[...document.querySelectorAll('.node')];

/* ====== apply state to DOM ====== */
function applyState(){
  nodeEls.forEach((el,i)=>{ el.classList.remove('done','active','locked','completed');
    const st=state.status[i];
    el.classList.add(st==='done'?'completed':st);
  });
  document.querySelectorAll('.seg').forEach(s=>{
    const idx=+s.dataset.seg;
    if(state.status[idx]==='done') s.classList.add('lit'); else s.classList.remove('lit');
  });
  // score is synced with the real account balance (updated by /game_result), no local inflation
  animateScore(BASE_SCORE);
}
let shownScore=null;
function animateScore(target){
  const el=document.getElementById('scoreVal');
  if(shownScore===null){ shownScore=target; el.textContent=target.toFixed(2); return; }
  const from=shownScore, to=target, t0=performance.now(), dur=600;
  function step(t){ const k=Math.min(1,(t-t0)/dur); const v=from+(to-from)*(1-Math.pow(1-k,3));
    el.textContent=v.toFixed(2); if(k<1) requestAnimationFrame(step); else shownScore=to; }
  requestAnimationFrame(step);
}

/* ====== modal ====== */
const overlay=document.getElementById('overlay');
let openIdx=-1;
function openNode(i){
  const st=state.status[i];
  if(st==='locked'){ const el=nodeEls[i]; el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),460);
    showToast('Алдымен алдыңғы блокты аяқта'); return; }
  openIdx=i; const n=NODES[i];
  document.getElementById('mImg').src=n.img;
  document.getElementById('mStep').textContent=`Блок ${i+1} / ${NODES.length}`;
  document.getElementById('mTitle').textContent=n.title;
  document.getElementById('mDesc').textContent=n.desc;
  const meta=document.getElementById('mMeta'); meta.innerHTML='';
  n.tags.forEach(t=>{ const c=document.createElement('span'); c.className='chip'; c.textContent=t; meta.appendChild(c); });
  if(st==='done'){ const c=document.createElement('span'); c.className='chip done'; c.textContent='✓ Аяқталды'; meta.appendChild(c); }
  const act=document.getElementById('mActions'); act.innerHTML='';
  const primary=document.createElement('button'); primary.className='btn btn-primary';
  primary.textContent = st==='done' ? 'Қайта өту' : 'Бастау';
  primary.onclick=()=>startBlock(i);
  const ghost=document.createElement('button'); ghost.className='btn btn-ghost'; ghost.textContent='Жабу'; ghost.onclick=closeModal;
  act.appendChild(primary); act.appendChild(ghost);
  overlay.classList.add('show');
}
function closeModal(){ overlay.classList.remove('show'); openIdx=-1; }
document.getElementById('mClose').onclick=closeModal;
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* startBlock: if the block has a real game page, go there.
   Otherwise (no game yet) simulate completion to demo the progression. */
function startBlock(i){
  const n=NODES[i];
  if(n.route){ window.location.href=n.route; return; }
  if(state.status[i]!=='done'){
    state.status[i]='done';
    if(i+1<NODES.length && state.status[i+1]==='locked') state.status[i+1]='active';
    save(); applyState(); celebrate(i);
  }
  closeModal();
}

/* ====== fx ====== */
const toast=document.getElementById('toast');
let toastT;
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>toast.classList.remove('show'),1900); }
function celebrate(i){
  const el=nodeEls[i]; const r=el.querySelector('.art');
  r.animate([{transform:'scale(1)'},{transform:'scale(1.18)'},{transform:'scale(1)'}],{duration:520,easing:'ease-out'});
  showToast('Блок аяқталды!');
}

applyState();

/* ====== fit-to-viewport scaling ====== */
const stage=document.getElementById('stage');
function fit(){ const s=Math.min(innerWidth/1920, innerHeight/1080); stage.style.transform='scale('+s+')'; }
window.addEventListener('resize',fit); fit();

/* reset helper (dev): localStorage.removeItem('bilimquest_t4_progress_v1') */
</script>
</body>
</html>
